{{- if and .Values.consolelink.enabled .Values.clusterDomain }}
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: {{ .Values.namespace }}-docs
spec:
  href: "https://docs-{{ .Values.namespace }}.apps.{{ .Values.clusterDomain }}"
  location: ApplicationMenu
  text: Red Hat Offline Knowledge Portal
  applicationMenu:
    section: Red Hat Applications
    imageURL: data:image/svg+xml;base64,
{{- end }}
